# ---------------------------------------------------------------------------
# Fluent Bit (요구사항 11)
# - DaemonSet 방식, logging 네임스페이스
# - wsc 네임스페이스 앱 Pod 의 stdout 로그를 CloudWatch Logs 로 전송
# - Log Group: /wsc/pod/log (Terraform 에서 KMS 암호화 생성), Stream: /wsc/app/log
# - /health 접근 로그는 제외
# - 1분 이내 수집 (flush 5s)
# - ServiceAccount(fluent-bit) 는 eksctl 이 IRSA 로 생성
# ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: logging
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Parsers_File  parsers.conf

    # wsc 네임스페이스 앱 컨테이너 로그만 수집
    [INPUT]
        Name              tail
        Tag               app.*
        Path              /var/log/containers/*_wsc_*.log
        Parser            cri
        Refresh_Interval  5
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On

    [FILTER]
        Name                kubernetes
        Match               app.*
        Kube_URL            https://kubernetes.default.svc.wsc.local:443
        Merge_Log           On
        Keep_Log            Off

    # /health 접근 로그는 CloudWatch 에 저장하지 않음
    [FILTER]
        Name    grep
        Match   app.*
        Exclude log /health

    [OUTPUT]
        Name              cloudwatch_logs
        Match             app.*
        region            ap-northeast-2
        log_group_name    /wsc/pod/log
        log_stream_name   /wsc/app/log
        auto_create_group false

  parsers.conf: |
    [PARSER]
        Name   cri
        Format regex
        Regex  ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      tolerations:
        - operator: Exists
      containers:
        - name: fluent-bit
          image: public.ecr.aws/aws-observability/aws-for-fluent-bit:stable
          resources:
            limits:
              memory: 200Mi
            requests:
              cpu: 50m
              memory: 100Mi
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: fluent-bit-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
