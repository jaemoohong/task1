# ---------------------------------------------------------------------------
# Helm values: prometheus-community/prometheus (요구사항 10 / 10-1)
# - Namespace: monitoring, Monitoring NodeGroup(type=monitoring) 에서 운용
# - node-exporter + kube-state-metrics 로 Node/Pod CPU·Memory 수집
# - /prometheus 경로(route-prefix)로 서비스
# - PVC: wsc-prometheus-pvc (wsc-sc, CMK 암호화)
#
# 설치:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm upgrade --install prometheus prometheus-community/prometheus \
#     -n monitoring -f prometheus-values.yaml
# Service 이름은 prometheus-server (datasource: http://prometheus-server.monitoring.svc.wsc.local/prometheus)
# ---------------------------------------------------------------------------
server:
  # 모니터링 노드그룹에 배치
  nodeSelector:
    type: monitoring
  # /prometheus 경로로 서비스 (Grafana datasource URL 과 일치)
  prefixURL: /prometheus
  baseURL: http://prometheus-server.monitoring.svc.wsc.local/prometheus
  extraFlags:
    - web.enable-lifecycle
  global:
    scrape_interval: 15s
  persistentVolume:
    enabled: true
    existingClaim: wsc-prometheus-pvc
  service:
    servicePort: 80

# node-exporter: 모든 Node 의 CPU/Memory 수집 (DaemonSet, 전체 노드)
prometheus-node-exporter:
  enabled: true

# kube-state-metrics: Pod/Deployment 등 오브젝트 상태 메트릭
kube-state-metrics:
  enabled: true
  nodeSelector:
    type: monitoring

alertmanager:
  enabled: false

pushgateway:
  enabled: false
