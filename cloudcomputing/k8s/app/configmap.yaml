# ---------------------------------------------------------------------------
# ConfigMap (요구사항 9.5)
# 환경변수를 Pod 에 직접 하드코딩하지 않고 ConfigMap 으로 중앙 관리.
# Reference02 의 Environment Variables 를 그대로 사용.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: wsc-config
  namespace: wsc
data:
  AWS_REGION: "ap-northeast-2"
  TABLE_NAME: "wsc-table"
